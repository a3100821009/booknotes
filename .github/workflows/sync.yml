name: Sync & Deploy

on:
  schedule:
    # 每天北京时间 9:00 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Fetch books data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_BOOKS_DB_ID: ${{ secrets.NOTION_BOOKS_DB_ID }}
          NOTION_RECORDS_DB_ID: ${{ secrets.NOTION_RECORDS_DB_ID }}
        run: python fetch_notion_api.py

      - name: Fetch book notes
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_BOOKS_DB_ID: ${{ secrets.NOTION_BOOKS_DB_ID }}
          NOTION_RECORDS_DB_ID: ${{ secrets.NOTION_RECORDS_DB_ID }}
        run: python fetch_content.py

      - name: Fetch reading records
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_BOOKS_DB_ID: ${{ secrets.NOTION_BOOKS_DB_ID }}
          NOTION_RECORDS_DB_ID: ${{ secrets.NOTION_RECORDS_DB_ID }}
        run: python fetch_reading_records.py

      - name: Generate HTML
        run: python gen_html_v2.py

      - name: Verify output
        run: |
          echo "dist/ contents:"
          ls -la dist/
          echo "Covers count:"
          ls dist/covers/ | wc -l
          echo "HTML size:"
          du -h dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
